<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Carbon Autopilot — Agentic DAG presentation</title>
<link rel="preconnect" href="https://esm.sh" />
<style>
  :root {
    /* DESIGN.md §2.1 brand */
    --brand-forest-950: #002E1B;
    --brand-forest-800: #005d36;
    --brand-forest-600: #0e6b40;
    --brand-mint-500: #00ff95;
    --brand-mint-200: #cdffad;
    --brand-mint-100: #e2f6d5;
    --brand-ink: #0e0f0c;
    --brand-paper: #fafaf9;

    /* §2.2 surfaces (light) */
    --bg-canvas: #fafaf9;
    --bg-surface: #ffffff;
    --bg-surface-muted: #f6f6f6;
    --bg-accent-subtle: #e2f6d5;
    --border-default: rgba(14, 15, 12, 0.12);
    --border-strong: rgba(14, 15, 12, 0.24);
    --ring-accent: rgba(0, 255, 149, 0.45);

    /* §2.3 text */
    --fg-primary: #0e0f0c;
    --fg-secondary: #454745;
    --fg-muted: #737373;
    --fg-on-accent: #002E1B;

    /* §2.4 confidence */
    --confidence-high: #00ff95;
    --confidence-medium: #f79009;
    --confidence-low: #f04438;

    /* §2.5 category rainbow */
    --cat-scope1: #912922;
    --cat-scope2: #377ef7;
    --cat-goods: #0e6b40;
    --cat-travel: #4000ff;
    --cat-digital: #955705;
    --cat-uncat: #737373;

    color-scheme: light dark;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg-canvas: #0a0a0a;
      --bg-surface: #121212;
      --bg-surface-muted: #1c1c1c;
      --bg-accent-subtle: #002E1B;
      --border-default: rgba(255, 255, 255, 0.10);
      --border-strong: rgba(255, 255, 255, 0.20);
      --ring-accent: rgba(0, 255, 149, 0.55);
      --fg-primary: #fafaf9;
      --fg-secondary: #a6a6a6;
      --cat-scope1: #ff6b5a;
      --cat-scope2: #00bfff;
      --cat-goods: #00ff95;
      --cat-travel: #bf00ff;
      --cat-digital: #f79009;
      --cat-uncat: #9e9e9e;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    background: var(--bg-canvas);
    color: var(--fg-primary);
    font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    font-weight: 500;
    font-feature-settings: "calt", "tnum";
    -webkit-font-smoothing: antialiased;
  }
  h1, h2, h3 { font-family: "Montserrat", "Inter", system-ui, sans-serif; letter-spacing: -0.015em; }
  .mono { font-family: ui-monospace, "Fragment Mono", "Geist Mono", monospace; }
  code, pre { font-family: ui-monospace, "Fragment Mono", "Geist Mono", monospace; }
  button { font-family: inherit; cursor: pointer; }

  .section {
    min-height: 100vh;
    padding: 96px 24px;
    max-width: 1152px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 600ms ease-out, transform 600ms ease-out;
  }
  .section.visible { opacity: 1; transform: translateY(0); }
  @media (prefers-reduced-motion: reduce) {
    .section { transition: opacity 300ms linear; transform: none; }
  }

  .eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--fg-muted);
  }
  .h1 { font-size: clamp(40px, 6vw, 72px); font-weight: 800; line-height: 1.0; }
  .h2 { font-size: clamp(24px, 3vw, 36px); font-weight: 700; line-height: 1.1; }
  .lead { font-size: 18px; line-height: 1.5; max-width: 66ch; color: var(--fg-secondary); }
  .lead code { background: var(--bg-surface-muted); padding: 2px 6px; border-radius: 6px; font-size: 15px; }

  .kpiRow {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--bg-surface);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    padding: 20px;
  }

  .stat { display: flex; flex-direction: column; gap: 8px; }
  .statLabel { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; color: var(--fg-muted); }
  .statValue { font-size: 28px; font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .statSub { font-size: 12px; color: var(--fg-secondary); }

  .confidenceBar { height: 6px; background: var(--bg-surface-muted); border-radius: 999px; overflow: hidden; margin-top: 8px; }
  .confidenceFill { height: 100%; transition: width 500ms ease-out; }

  .nav {
    position: fixed;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    background: color-mix(in srgb, var(--bg-surface) 80%, transparent);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--border-default);
    border-radius: 12px;
    z-index: 10;
  }
  .navItem {
    padding: 4px 10px;
    border-radius: 999px;
    color: var(--fg-secondary);
    font-size: 12px;
    font-weight: 500;
    background: transparent;
    border: none;
    text-align: left;
    transition: color 150ms, background 150ms;
  }
  .navItem:hover { background: var(--bg-surface-muted); color: var(--fg-primary); }
  .navItem[data-active="true"] { color: var(--fg-on-accent); background: var(--brand-mint-500); }

  .dagGrid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  @media (max-width: 960px) { .dagGrid { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 640px) { .dagGrid { grid-template-columns: 1fr; } }

  .agentNode {
    padding: 16px;
    border-radius: 12px;
    border: 1px solid var(--border-default);
    background: var(--bg-surface);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: transform 150ms ease-out, box-shadow 300ms ease-out;
  }
  .agentNode[data-active="true"] {
    box-shadow: 0 0 0 2px var(--brand-mint-500);
    transform: translateY(-2px);
  }
  .agentDot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    display: inline-block;
    margin-right: 6px;
    vertical-align: middle;
  }
  .agentTitle { font-weight: 600; font-size: 13px; color: var(--fg-primary); }
  .agentMeta { font-size: 11px; color: var(--fg-muted); font-variant-numeric: tabular-nums; }

  .pill {
    display: inline-flex;
    align-items: center;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
    background: var(--bg-accent-subtle);
    color: var(--fg-on-accent);
  }

  .replayPanel { display: grid; grid-template-columns: 320px 1fr; gap: 16px; }
  @media (max-width: 768px) { .replayPanel { grid-template-columns: 1fr; } }
  .replayControls { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; align-items: center; }

  .button {
    display: inline-flex;
    align-items: center;
    padding: 0 16px;
    height: 36px;
    border-radius: 999px;
    font-weight: 600;
    font-size: 13px;
    border: none;
    transition: transform 150ms ease-out, background 150ms;
  }
  .button:active { transform: scale(0.98); }
  .button:hover { transform: scale(1.02); }
  @media (prefers-reduced-motion: reduce) {
    .button:active, .button:hover { transform: none; }
  }
  .buttonPrimary { background: var(--brand-mint-500); color: var(--fg-on-accent); }
  .buttonGhost { background: transparent; color: var(--fg-primary); border: 1px solid var(--border-default); }

  .payload {
    background: var(--bg-surface-muted);
    border-radius: 12px;
    padding: 16px;
    font-size: 12px;
    line-height: 1.5;
    white-space: pre-wrap;
    max-height: 360px;
    overflow: auto;
  }

  .linearFlow { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .linearNode {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--border-default);
    font-size: 12px;
    font-weight: 500;
    color: var(--fg-secondary);
    background: var(--bg-surface-muted);
  }
  .linearArrow { color: var(--fg-muted); font-size: 14px; }

  .matrix {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 1px;
    background: var(--border-default);
    border: 1px solid var(--border-default);
    border-radius: 16px;
    overflow: hidden;
    min-height: 280px;
  }
  .matrixCell {
    background: var(--bg-surface);
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .matrixHeader {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 600;
    color: var(--fg-muted);
  }
  .matrixItem {
    font-size: 13px;
    padding: 8px 12px;
    background: var(--bg-surface-muted);
    border-radius: 8px;
    border-left: 3px solid var(--brand-mint-500);
  }
  .matrixCell[data-quadrant="hchc"] .matrixItem { border-left-color: var(--confidence-low); }
  .matrixCell[data-quadrant="lchc"] .matrixItem { border-left-color: var(--confidence-medium); }
  .matrixCell[data-quadrant="hclc"] .matrixItem { border-left-color: var(--cat-scope2); }
</style>
</head>
<body>
<div id="root"></div>

<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "motion/react": "https://esm.sh/motion@12.0.11/react?deps=react@18.3.1,react-dom@18.3.1",
    "htm": "https://esm.sh/htm@3.1.1"
  }
}
</script>

<script type="module">
import React, { useState, useEffect, useRef } from "react";
import { createRoot } from "react-dom/client";
import { motion } from "motion/react";
import htm from "htm";
const html = htm.bind(React.createElement);

// ── Data: baked DAG run (mirrors fixtures/demo-runs/sample-run.json) ──────
const run = {
  runId: "run_demo_2026_03",
  totalLatencyMs: 6400,
  metrics: {
    spend_emissions_baseline_agent: { latencyMs: 420, inputTokens: 1850, outputTokens: 620, cached: true },
    green_alternatives_agent:        { latencyMs: 1840, inputTokens: 3200, outputTokens: 2100, cached: false },
    cost_savings_agent:              { latencyMs: 1780, inputTokens: 3150, outputTokens: 1950, cached: false },
    green_judge_agent:               { latencyMs: 980, inputTokens: 2700, outputTokens: 900, cached: false },
    cost_judge_agent:                { latencyMs: 1020, inputTokens: 2650, outputTokens: 880, cached: false },
    carbon_credit_incentive_strategy_agent: { latencyMs: 1340, inputTokens: 4100, outputTokens: 1450, cached: false },
    executive_report_agent:          { latencyMs: 1620, inputTokens: 3900, outputTokens: 1850, cached: false }
  },
  baseline: {
    total_spend_eur: 128430,
    estimated_total_tco2e: 41.2,
    baseline_confidence: 0.74,
    top_spend_categories: [
      { category: "procurement", spend_eur: 46200, share_pct: 36 },
      { category: "travel",      spend_eur: 28800, share_pct: 22 },
      { category: "food",        spend_eur: 18300, share_pct: 14 },
      { category: "software",    spend_eur: 14700, share_pct: 11 },
      { category: "office",      spend_eur: 12100, share_pct: 9 }
    ]
  },
  summaries: {
    green_alternatives_agent: { total_current_kg_co2e: 95580, total_potential_kg_co2e_saved: 76020, top_green_opportunities: ["Rail for short-haul EU", "Vegetarian catering mix"], average_confidence: 0.83 },
    cost_savings_agent:       { total_observed_spend_eur: 73080, total_potential_annual_saving_eur: 9480, top_cost_opportunities: ["SaaS consolidation", "Amazon Business bulk contract"], average_confidence: 0.76 },
    green_judge_agent:        { approved_total_current_kg_co2e: 95580, approved_total_potential_kg_co2e_saved: 75900, high_confidence_green_opportunities: ["Rail-for-short-haul EU", "Vegetarian catering mix"] },
    cost_judge_agent:         { approved_total_annual_saving_eur: 8040, high_confidence_cost_opportunities: ["SaaS consolidation"] },
    carbon_credit_incentive_strategy_agent: { total_direct_procurement_saving_eur: 17440, total_emissions_reduced_tco2e: 75.9, total_net_company_scale_financial_impact_eur: 28766, tax_advisor_review_required: true }
  },
  executiveReport: {
    report_title: "Acme BV — Monthly carbon close (March 2026)",
    executive_summary: "Three approved switches reduce annualized emissions by 75.9 tCO2e and create EUR 28.8k of net company-scale financial impact.",
    kpis: {
      baseline_annual_spend_eur: 1541160,
      direct_procurement_savings_eur: 17440,
      emissions_reduced_tco2e: 75.9,
      recommended_credit_purchase_cost_eur: 50208,
      estimated_tax_incentive_upside_eur: 4498,
      net_company_scale_financial_impact_eur: 28766,
      payback_period_months: 0,
      confidence: 0.79
    },
    top_recommendations: [
      { rank: 1, title: "Rail for EU routes <700km",         category: "travel",      carbon_saving_kg: 73900, annual_saving_eur: 9400, matrix_quadrant: "low_cost_low_carbon", confidence: 0.88 },
      { rank: 2, title: "Vegetarian/chicken catering mix",   category: "food",        carbon_saving_kg: 2000,  annual_saving_eur: 1800, matrix_quadrant: "low_cost_low_carbon", confidence: 0.77 },
      { rank: 3, title: "SaaS consolidation: drop Confluence", category: "software",  carbon_saving_kg: 40,    annual_saving_eur: 3720, matrix_quadrant: "low_cost_low_carbon", confidence: 0.84 },
      { rank: 4, title: "Amazon Business bulk contract",     category: "procurement", carbon_saving_kg: 0,     annual_saving_eur: 4320, matrix_quadrant: "low_cost_high_carbon", confidence: 0.65 }
    ],
    matrix: {
      low_cost_low_carbon:  ["Rail for EU routes <700km", "Vegetarian catering mix", "SaaS consolidation"],
      high_cost_low_carbon: [],
      low_cost_high_carbon: ["Amazon Business bulk contract"],
      high_cost_high_carbon: []
    },
    limitations: [
      "Tax treatment of travel-mode switches not yet confirmed with accountant.",
      "Bulk procurement benchmark is category-average, not a live supplier quote."
    ]
  }
};

// ── Agent ordering + colors (matches DESIGN.md category rainbow §2.5) ─────
const AGENTS = [
  { id: "spend_emissions_baseline_agent",        label: "Spend & Emissions Baseline", color: "var(--cat-uncat)",   group: 1 },
  { id: "green_alternatives_agent",              label: "Green Alternatives",         color: "var(--cat-goods)",   group: 2 },
  { id: "cost_savings_agent",                    label: "Cost Savings",               color: "var(--cat-digital)", group: 2 },
  { id: "green_judge_agent",                     label: "Green Judge",                color: "var(--cat-goods)",   group: 3 },
  { id: "cost_judge_agent",                      label: "Cost Judge",                 color: "var(--cat-digital)", group: 3 },
  { id: "carbon_credit_incentive_strategy_agent",label: "Credit & Incentive Strategy",color: "var(--cat-travel)",  group: 4 },
  { id: "executive_report_agent",                label: "Executive Report",           color: "var(--cat-scope2)",  group: 5 }
];

const SECTIONS = [
  { id: "hero",     label: "Hero" },
  { id: "problem",  label: "Problem" },
  { id: "current",  label: "Today" },
  { id: "proposed", label: "Proposed" },
  { id: "replay",   label: "Live run" },
  { id: "report",   label: "CFO report" },
  { id: "vision",   label: "Vision" }
];

const eur = (v) => `€${(v ?? 0).toLocaleString("en-NL")}`;
const tCO2e = (kg) => (kg / 1000).toFixed(1);

// ── ConfidenceBar ─────────────────────────────────────────────────────────
const ConfidenceBar = ({ value }) => {
  const tier = value >= 0.85 ? "var(--confidence-high)" : value >= 0.6 ? "var(--confidence-medium)" : "var(--confidence-low)";
  return html`
    <div class="confidenceBar" aria-label=${`Confidence ${Math.round(value * 100)}%`}>
      <div class="confidenceFill" style=${{ width: `${Math.round(value * 100)}%`, background: tier }} />
    </div>
  `;
};

// ── Nav rail + active-section tracking ────────────────────────────────────
const Nav = ({ active }) => html`
  <nav class="nav" aria-label="Presentation sections">
    ${SECTIONS.map((s) => html`
      <button
        key=${s.id}
        type="button"
        class="navItem"
        data-active=${active === s.id}
        onClick=${() => document.querySelector(`[data-section="${s.id}"]`)?.scrollIntoView({ behavior: "smooth" })}
      >${s.label}</button>
    `)}
  </nav>
`;

// ── DagReplay ─────────────────────────────────────────────────────────────
const summaryFor = (id) => {
  if (id === "spend_emissions_baseline_agent") return run.baseline;
  if (id === "executive_report_agent") return run.executiveReport.kpis;
  return run.summaries[id] ?? {};
};

const DagReplay = () => {
  const [step, setStep] = useState(0);
  const [playing, setPlaying] = useState(false);
  const timer = useRef(null);

  useEffect(() => {
    if (!playing) return;
    if (step >= AGENTS.length) { setPlaying(false); return; }
    const ms = Math.max(400, run.metrics[AGENTS[step].id]?.latencyMs ?? 800);
    timer.current = setTimeout(() => setStep((s) => s + 1), ms);
    return () => timer.current && clearTimeout(timer.current);
  }, [playing, step]);

  const current = AGENTS[Math.min(step, AGENTS.length - 1)];
  const payload = JSON.stringify(summaryFor(current.id), null, 2);

  return html`
    <div>
      <div class="replayPanel">
        <div style=${{ display: "flex", flexDirection: "column", gap: 8 }}>
          ${AGENTS.map((agent, i) => html`
            <div key=${agent.id} class="agentNode" data-active=${i <= step}>
              <div>
                <span class="agentDot" style=${{ background: agent.color }} />
                <span class="agentTitle">${agent.label}</span>
              </div>
              <div class="agentMeta">
                ${run.metrics[agent.id].latencyMs}ms · in ${run.metrics[agent.id].inputTokens}tok · out ${run.metrics[agent.id].outputTokens}tok${run.metrics[agent.id].cached ? " · cached" : ""}
              </div>
            </div>
          `)}
        </div>
        <div>
          <div class="statLabel">${current.label} output</div>
          <pre class="payload">${payload}</pre>
        </div>
      </div>
      <div class="replayControls">
        <button
          class="button buttonPrimary"
          onClick=${() => { setStep(0); setPlaying(true); }}
        >${playing ? "Playing…" : "▶ Play DAG"}</button>
        <button
          class="button buttonGhost"
          onClick=${() => { setPlaying(false); setStep(0); }}
        >Reset</button>
        <span class="agentMeta">Baked total ${run.totalLatencyMs.toFixed(0)}ms · run ${run.runId}</span>
      </div>
    </div>
  `;
};

// ── Page shell ────────────────────────────────────────────────────────────
const useActiveSection = () => {
  const [active, setActive] = useState("hero");
  useEffect(() => {
    const obs = new IntersectionObserver((entries) => {
      for (const e of entries) {
        if (e.isIntersecting) setActive(e.target.dataset.section);
        e.target.classList.toggle("visible", e.isIntersecting);
      }
    }, { threshold: 0.25 });
    document.querySelectorAll("[data-section]").forEach((el) => obs.observe(el));
    return () => obs.disconnect();
  }, []);
  return active;
};

const App = () => {
  const active = useActiveSection();
  const exec = run.executiveReport;

  return html`
    <main>
      <${Nav} active=${active} />

      <section class="section" data-section="hero">
        <span class="eyebrow">Carbon Autopilot · bunq hackathon 7.0 · 2026</span>
        <h1 class="h1">We turn bunq transactions into a CFO-ready monthly carbon close.</h1>
        <p class="lead">
          An autonomous 7-agent DAG reads a company’s month of spending, finds greener and cheaper alternatives,
          judges them, and composes a signed executive report with a net company-scale financial impact number.
        </p>
        <div class="kpiRow">
          <div class="card">
            <div class="stat">
              <div class="statLabel">Baseline emissions</div>
              <div class="statValue">${run.baseline.estimated_total_tco2e.toFixed(1)} tCO₂e</div>
              <div class="statSub">${eur(run.baseline.total_spend_eur)} spend analyzed</div>
              <${ConfidenceBar} value=${run.baseline.baseline_confidence} />
            </div>
          </div>
          <div class="card">
            <div class="stat">
              <div class="statLabel">Net annual impact</div>
              <div class="statValue">${eur(exec.kpis.net_company_scale_financial_impact_eur)}</div>
              <div class="statSub">${exec.kpis.emissions_reduced_tco2e.toFixed(1)} tCO₂e reduced</div>
              <${ConfidenceBar} value=${exec.kpis.confidence} />
            </div>
          </div>
        </div>
      </section>

      <section class="section" data-section="problem">
        <span class="eyebrow">Problem</span>
        <h2 class="h2">A monthly close is a reasoning task, not a template.</h2>
        <p class="lead">
          Spreadsheets aggregate. Template reports render. Neither can say
          <em>“switch the AMS–FRA flights to rail; buy 18 tCO₂e of EU removal credits; cancel Confluence — net impact €28.8k.”</em>
          A single LLM call can’t either, because the steps must be proposed, challenged, corrected, and composed — not free-associated.
        </p>
        <div class="kpiRow">
          <div class="card"><div class="stat"><div class="statLabel">Today — LLM touchpoints</div><div class="statValue">2</div><div class="statSub">refinement Q&amp;A + narrative</div></div></div>
          <div class="card"><div class="stat"><div class="statLabel">Proposed — reasoning agents</div><div class="statValue">7</div><div class="statSub">propose · judge · strategize · compose</div></div></div>
          <div class="card"><div class="stat"><div class="statLabel">Critical-path LLM calls</div><div class="statValue">5</div><div class="statSub">parallel fan-out at two stages</div></div></div>
        </div>
      </section>

      <section class="section" data-section="current">
        <span class="eyebrow">Today</span>
        <h2 class="h2">A 12-state orchestrator with two LLM touchpoints.</h2>
        <p class="lead">
          The state machine survives restarts and renders the close as a deterministic, auditable sequence. But
          the reasoning layer is thin — one Sonnet call generates refinement questions; a second composes the narrative.
          No proposals, no validation, no CFO-grade net impact.
        </p>
        <div class="linearFlow">
          ${["AGGREGATE","ESTIMATE_INITIAL","CLUSTER","DAG_RUNNING (7-agent DAG)","AWAITING_ANSWERS","APPLY_ANSWERS","ESTIMATE_FINAL","APPLY_POLICY","PROPOSED","AWAITING_APPROVAL","EXECUTING","COMPLETED"].map((s, i) => html`
            <${React.Fragment} key=${s}>
              <span class="linearNode">${s}</span>
              ${i < 11 ? html`<span class="linearArrow">→</span>` : null}
            </${React.Fragment}>
          `)}
        </div>
      </section>

      <section class="section" data-section="proposed">
        <span class="eyebrow">Proposed</span>
        <h2 class="h2">Seven agents, two judges, one composer.</h2>
        <p class="lead">
          The DAG keeps the 12-state orchestrator and replaces its LLM touchpoints with a structured reasoning graph.
          Every number the CFO sees has been proposed by a worker, validated by a judge, and composed by a reporter.
        </p>
        <div class="dagGrid">
          ${AGENTS.map((agent) => html`
            <${motion.div}
              key=${agent.id}
              class="agentNode"
              initial=${{ opacity: 0, y: 8 }}
              whileInView=${{ opacity: 1, y: 0 }}
              viewport=${{ once: true, amount: 0.3 }}
              transition=${{ duration: 0.4, delay: agent.group * 0.08 }}
            >
              <div><span class="agentDot" style=${{ background: agent.color }} /><span class="agentTitle">${agent.label}</span></div>
              <div class="agentMeta">Stage ${agent.group} · ${run.metrics[agent.id].latencyMs}ms · ${run.metrics[agent.id].inputTokens + run.metrics[agent.id].outputTokens} tok</div>
              <div class="agentMeta">System prompt in docs/agents/.</div>
            </${motion.div}>
          `)}
        </div>
        <p class="lead">
          <strong>Parallel fan-out:</strong> Green Alternatives ‖ Cost Savings at stage 2; Green Judge ‖ Cost Judge at stage 3.
          Wall-clock critical path = 5 Sonnet calls, not 7.
        </p>
      </section>

      <section class="section" data-section="replay">
        <span class="eyebrow">Live run</span>
        <h2 class="h2">Baked replay from a real DAG run.</h2>
        <p class="lead">
          Pre-recorded outputs from a <code>runDag()</code> execution on March 2026 mock data.
          Every payload below is the agent’s real structured response, not hand-written commentary.
        </p>
        <${DagReplay} />
      </section>

      <section class="section" data-section="report">
        <span class="eyebrow">CFO report</span>
        <h2 class="h2">${exec.report_title}</h2>
        <p class="lead">${exec.executive_summary}</p>
        <div class="kpiRow">
          <div class="card"><div class="stat"><div class="statLabel">Procurement savings</div><div class="statValue">${eur(exec.kpis.direct_procurement_savings_eur)}</div><div class="statSub">annual, approved items only</div></div></div>
          <div class="card"><div class="stat"><div class="statLabel">Credits needed</div><div class="statValue">${eur(exec.kpis.recommended_credit_purchase_cost_eur)}</div><div class="statSub">EU removal, post-reduction</div></div></div>
          <div class="card"><div class="stat"><div class="statLabel">Tax / incentive upside</div><div class="statValue">${eur(exec.kpis.estimated_tax_incentive_upside_eur)}</div><div class="statSub">scenario; advisor review req’d</div></div></div>
          <div class="card"><div class="stat"><div class="statLabel">Net impact</div><div class="statValue">${eur(exec.kpis.net_company_scale_financial_impact_eur)}</div><div class="statSub">payback ${exec.kpis.payback_period_months} months</div><${ConfidenceBar} value=${exec.kpis.confidence} /></div></div>
        </div>
        <div class="matrix" aria-label="Price vs carbon matrix">
          <div class="matrixCell" data-quadrant="hclc">
            <div class="matrixHeader">High cost · low carbon</div>
            ${exec.matrix.high_cost_low_carbon.map((r) => html`<div key=${r} class="matrixItem">${r}</div>`)}
          </div>
          <div class="matrixCell" data-quadrant="lclc">
            <div class="matrixHeader">Low cost · low carbon</div>
            ${exec.matrix.low_cost_low_carbon.map((r) => html`<div key=${r} class="matrixItem">${r}</div>`)}
          </div>
          <div class="matrixCell" data-quadrant="hchc">
            <div class="matrixHeader">High cost · high carbon</div>
            ${exec.matrix.high_cost_high_carbon.map((r) => html`<div key=${r} class="matrixItem">${r}</div>`)}
          </div>
          <div class="matrixCell" data-quadrant="lchc">
            <div class="matrixHeader">Low cost · high carbon</div>
            ${exec.matrix.low_cost_high_carbon.map((r) => html`<div key=${r} class="matrixItem">${r}</div>`)}
          </div>
        </div>
      </section>

      <section class="section" data-section="vision">
        <span class="eyebrow">Next</span>
        <h2 class="h2">Replace the linear close with the DAG. Wire live Anthropic calls behind the mock flag.</h2>
        <p class="lead">
          The scaffold lives under <code>lib/agents/dag/</code>. Per-agent system prompts + I/O schemas are in <code>docs/agents/</code>.
          Context-scaling patterns (no raw rows, bounded tools, prompt caching, parallel fan-out) are in <code>research/13-context-scaling-patterns.md</code>.
          Flip <code>ANTHROPIC_MOCK=0</code> and set <code>ANTHROPIC_API_KEY</code> in <code>.env.local</code> to go live.
        </p>
        <div style=${{ display: "flex", gap: 12, flexWrap: "wrap" }}>
          <span class="pill">Spec: .forge/specs/spec-agentic-dag.md</span>
          <span class="pill">Comparison: docs/architecture-comparison.md</span>
          <span class="pill">Research: research/13-context-scaling-patterns.md</span>
        </div>
      </section>
    </main>
  `;
};

createRoot(document.getElementById("root")).render(html`<${App} />`);
</script>
</body>
</html>
